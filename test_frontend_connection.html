<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Frontend Connection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #4338CA;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>SkillSync API Connection Test</h1>
    
    <div class="test-section">
        <h2>1. Test Backend Connection</h2>
        <button onclick="testRoot()">Test Root Endpoint</button>
        <button onclick="testHealth()">Test Health Endpoint</button>
        <div id="connection-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. Test Login</h2>
        <input type="email" id="login-email" placeholder="Email" value="testuser@example.com" style="padding: 8px; margin: 5px; width: 200px;">
        <input type="password" id="login-password" placeholder="Password" value="password123" style="padding: 8px; margin: 5px; width: 200px;">
        <button onclick="testLogin()">Test Login</button>
        <div id="login-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. Test Signup</h2>
        <button onclick="testSignup()">Test Signup (Random User)</button>
        <div id="signup-result" class="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';

        async function testRoot() {
            const resultDiv = document.getElementById('connection-result');
            resultDiv.textContent = 'Testing...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                resultDiv.textContent = `✓ Success!\n${JSON.stringify(data, null, 2)}`;
                resultDiv.className = 'result success';
            } catch (error) {
                resultDiv.textContent = `✗ Error: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }

        async function testHealth() {
            const resultDiv = document.getElementById('connection-result');
            resultDiv.textContent = 'Testing...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/api/health`);
                const data = await response.json();
                resultDiv.textContent = `✓ Success!\n${JSON.stringify(data, null, 2)}`;
                resultDiv.className = 'result success';
            } catch (error) {
                resultDiv.textContent = `✗ Error: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            resultDiv.textContent = 'Testing login...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Login failed');
                }
                
                const data = await response.json();
                resultDiv.textContent = `✓ Login Success!\n${JSON.stringify(data, null, 2)}`;
                resultDiv.className = 'result success';
            } catch (error) {
                resultDiv.textContent = `✗ Login Error: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }

        async function testSignup() {
            const resultDiv = document.getElementById('signup-result');
            const randomId = Math.floor(Math.random() * 10000);
            
            resultDiv.textContent = 'Testing signup...';
            resultDiv.className = 'result';
            
            const userData = {
                name: `Test User ${randomId}`,
                email: `test${randomId}@example.com`,
                password: 'password123',
                location: 'Test City',
                bio: 'Test bio',
                availability: ['Weekdays'],
                skillsOffered: ['Python'],
                skillsWanted: ['JavaScript']
            };
            
            try {
                const response = await fetch(`${API_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData),
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Signup failed');
                }
                
                const data = await response.json();
                resultDiv.textContent = `✓ Signup Success!\n${JSON.stringify(data, null, 2)}`;
                resultDiv.className = 'result success';
            } catch (error) {
                resultDiv.textContent = `✗ Signup Error: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
